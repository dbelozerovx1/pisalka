services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/arrow-flight;
      /usr/bin/mc anonymous set none local/arrow-flight;
      "

  hive-metastore:
    image: apache/hive:${HIVE_VERSION:-4.1.0}
    depends_on:
      minio-create-bucket:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: metastore
      HADOOP_CLASSPATH: "/opt/hadoop/share/hadoop/tools/lib/*"
      SERVICE_OPTS: >-
        -Dfs.s3.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
        -Dfs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
        -Dfs.s3a.endpoint=http://minio:9000
        -Dfs.s3a.access.key=minioadmin
        -Dfs.s3a.secret.key=minioadmin
        -Dfs.s3a.path.style.access=true
        -Dfs.s3a.connection.ssl.enabled=false
        -Dfs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
    ports:
      - "9083:9083"

  trino:
    image: trinodb/trino:${TRINO_VERSION:-481}
    depends_on:
      minio-create-bucket:
        condition: service_completed_successfully
      hive-metastore:
        condition: service_started
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    ports:
      - "8080:8080"

  trino-init:
    image: python:3.12-alpine
    depends_on:
      trino:
        condition: service_started
    environment:
      TRINO_URI: "${TRINO_URI:-http://trino:8080}"
      TRINO_USER: "${TRINO_USER:-local}"
      TRINO_CATALOG: "${TRINO_CATALOG:-iceberg}"
      TRINO_SCHEMA: "${TRINO_SCHEMA:-arrow}"
      ICEBERG_SCHEMA_LOCATION: "${ICEBERG_SCHEMA_LOCATION:-s3a://arrow-flight/iceberg/arrow}"
      TRINO_INIT_REQUIRE_SCHEMA: "${TRINO_INIT_REQUIRE_SCHEMA:-false}"
    volumes:
      - ./trino/init_schema.py:/init_schema.py:ro
    command: ["python", "/init_schema.py"]

  metadata-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flight_metadata
      POSTGRES_USER: flight
      POSTGRES_PASSWORD: flight
    ports:
      - "5432:5432"
    volumes:
      - metadata-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight -d flight_metadata"]
      interval: 2s
      timeout: 5s
      retries: 20

  metadata-migrate:
    image: postgres:16-alpine
    depends_on:
      metadata-db:
        condition: service_healthy
    environment:
      PGPASSWORD: flight
    volumes:
      - ./db/migrations:/migrations:ro
    entrypoint: >
      /bin/sh -c "
      for migration in /migrations/*.sql; do
        echo applying $$migration;
        psql -h metadata-db -U flight -d flight_metadata -v ON_ERROR_STOP=1 -f $$migration;
      done;
      "

  flight-server:
    build:
      context: .
      target: server
    depends_on:
      minio-create-bucket:
        condition: service_completed_successfully
      metadata-db:
        condition: service_healthy
      metadata-migrate:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info
      FLIGHT_ADDR: 0.0.0.0:50051
      METRICS_ENABLED: "${METRICS_ENABLED:-true}"
      METRICS_ADDR: "${METRICS_ADDR:-0.0.0.0:9090}"
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: arrow-flight
      S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ALLOW_HTTP: "true"
      PARQUET_COMPRESSION: "${PARQUET_COMPRESSION:-snappy}"
      PARQUET_DICTIONARY: "${PARQUET_DICTIONARY:-false}"
      PARQUET_MAX_ROW_GROUP_ROWS: "${PARQUET_MAX_ROW_GROUP_ROWS:-1048576}"
      PARQUET_WRITE_BATCH_SIZE: "${PARQUET_WRITE_BATCH_SIZE:-65536}"
      PARQUET_FLUSH_THRESHOLD_BYTES: "${PARQUET_FLUSH_THRESHOLD_BYTES:-268435456}"
      S3_MULTIPART_PART_SIZE: "${S3_MULTIPART_PART_SIZE:-67108864}"
      S3_MULTIPART_MAX_CONCURRENCY: "${S3_MULTIPART_MAX_CONCURRENCY:-16}"
      WORKER_ID: "${WORKER_ID:-local-worker}"
      WORKER_FLIGHT_URI: "${WORKER_FLIGHT_URI:-http://flight-server:50051}"
      WORKER_ZONE: "${WORKER_ZONE:-}"
      WORKER_DRAINING: "${WORKER_DRAINING:-false}"
      WORKER_REQUIRE_STRUCTURED_TICKETS: "${WORKER_REQUIRE_STRUCTURED_TICKETS:-false}"
      WORKER_HEARTBEAT_INTERVAL_MS: "${WORKER_HEARTBEAT_INTERVAL_MS:-5000}"
      WORKER_REGISTRY_TTL_MS: "${WORKER_REGISTRY_TTL_MS:-15000}"
      WORKER_REQUIRE_SIGNED_CAPABILITIES: "${WORKER_REQUIRE_SIGNED_CAPABILITIES:-false}"
      WORKER_CAPABILITY_SECRET: "${WORKER_CAPABILITY_SECRET:-}"
      WORKER_REQUIRE_CAPABILITY_WORKER_ID: "${WORKER_REQUIRE_CAPABILITY_WORKER_ID:-}"
      WORKER_CAPABILITY_MAX_TTL_MS: "${WORKER_CAPABILITY_MAX_TTL_MS:-3600000}"
      WORKER_MEMORY_BYTES: "${WORKER_MEMORY_BYTES:-}"
      WORKER_RESERVED_MEMORY_BYTES: "${WORKER_RESERVED_MEMORY_BYTES:-}"
      PUT_MEMORY_PERCENT: "${PUT_MEMORY_PERCENT:-55}"
      PUT_MEMORY_BUDGET_BYTES: "${PUT_MEMORY_BUDGET_BYTES:-}"
      PUT_MAX_STREAM_MEMORY_BYTES: "${PUT_MAX_STREAM_MEMORY_BYTES:-}"
      PUT_MAX_RECORD_BATCH_BYTES: "${PUT_MAX_RECORD_BATCH_BYTES:-}"
      READ_MEMORY_PERCENT: "${READ_MEMORY_PERCENT:-30}"
      READ_MEMORY_BUDGET_BYTES: "${READ_MEMORY_BUDGET_BYTES:-}"
      READ_MAX_STREAM_MEMORY_BYTES: "${READ_MAX_STREAM_MEMORY_BYTES:-}"
      READ_MAX_RECORD_BATCH_BYTES: "${READ_MAX_RECORD_BATCH_BYTES:-}"
      READ_MAX_BATCH_ROWS: "${READ_MAX_BATCH_ROWS:-1048576}"
      PUT_MAX_ACTIVE_STREAMS: "${PUT_MAX_ACTIVE_STREAMS:-16}"
      PUT_MAX_STREAMS_PER_UPLOAD: "${PUT_MAX_STREAMS_PER_UPLOAD:-8}"
      PUT_SCHEDULER_RESERVED_SLOTS: "${PUT_SCHEDULER_RESERVED_SLOTS:-0}"
      PUT_SLOT_WAIT_MS: "${PUT_SLOT_WAIT_MS:-30000}"
      PUT_FIRST_BATCH_TIMEOUT_MS: "${PUT_FIRST_BATCH_TIMEOUT_MS:-10000}"
      PUT_MAX_STREAM_BYTES: "${PUT_MAX_STREAM_BYTES:-}"
      PUT_REQUIRE_STAGING_PREFIX: "${PUT_REQUIRE_STAGING_PREFIX:-false}"
      METADATA_DATABASE_URL: "${METADATA_DATABASE_URL:-postgres://flight:flight@metadata-db:5432/flight_metadata}"
      METADATA_DB_AUTO_MIGRATE: "${METADATA_DB_AUTO_MIGRATE:-false}"
      PUT_PARALLELISM: "${PUT_PARALLELISM:-4}"
      PUT_QUEUE_DEPTH: "${PUT_QUEUE_DEPTH:-2}"
      READ_MAX_ACTIVE_STREAMS: "${READ_MAX_ACTIVE_STREAMS:-16}"
      READ_MAX_STREAMS_PER_OPERATION: "${READ_MAX_STREAMS_PER_OPERATION:-8}"
      READ_SCHEDULER_RESERVED_SLOTS: "${READ_SCHEDULER_RESERVED_SLOTS:-0}"
      READ_SLOT_WAIT_MS: "${READ_SLOT_WAIT_MS:-30000}"
      READ_BATCH_SIZE: "${READ_BATCH_SIZE:-65536}"
      FLIGHT_MAX_MESSAGE_SIZE: "${FLIGHT_MAX_MESSAGE_SIZE:-268435456}"
      FLIGHT_DATA_CHUNK_SIZE: "${FLIGHT_DATA_CHUNK_SIZE:-16777216}"
    ports:
      - "50051:50051"
      - "9090:9090"

  coordinator:
    build:
      context: ./coordinator-java
    depends_on:
      flight-server:
        condition: service_started
      trino-init:
        condition: service_completed_successfully
    environment:
      COORDINATOR_ADDR: 0.0.0.0:8088
      COORDINATOR_ADMIN_TOKEN: "${COORDINATOR_ADMIN_TOKEN:-}"
      COORDINATOR_CAPABILITY_SECRET: "${COORDINATOR_CAPABILITY_SECRET:-local-dev-secret}"
      COORDINATOR_METADATA_DATABASE_URL: "${COORDINATOR_METADATA_DATABASE_URL:-postgres://flight:flight@metadata-db:5432/flight_metadata}"
      COORDINATOR_CAPABILITY_TTL_MS: "${COORDINATOR_CAPABILITY_TTL_MS:-900000}"
      COORDINATOR_PUT_CAPABILITY_TTL_MS: "${COORDINATOR_PUT_CAPABILITY_TTL_MS:-900000}"
      COORDINATOR_GET_CAPABILITY_TTL_MS: "${COORDINATOR_GET_CAPABILITY_TTL_MS:-300000}"
      COORDINATOR_UPLOAD_SESSION_TTL_MS: "${COORDINATOR_UPLOAD_SESSION_TTL_MS:-3600000}"
      COORDINATOR_STAGING_PREFIX_ROOT: "${COORDINATOR_STAGING_PREFIX_ROOT:-coordinator/staging}"
      COORDINATOR_OBJECT_STORE_URI_PREFIX: "${COORDINATOR_OBJECT_STORE_URI_PREFIX:-s3a://arrow-flight}"
      COORDINATOR_DEFAULT_UPLOAD_STREAMS: "${COORDINATOR_DEFAULT_UPLOAD_STREAMS:-1}"
      COORDINATOR_DEFAULT_TARGET_FILE_SIZE_BYTES: "${COORDINATOR_DEFAULT_TARGET_FILE_SIZE_BYTES:-536870912}"
      COORDINATOR_DEFAULT_MAX_STREAM_BYTES: "${COORDINATOR_DEFAULT_MAX_STREAM_BYTES:-10737418240}"
      COORDINATOR_DEFAULT_MAX_UPLOAD_STREAMS: "${COORDINATOR_DEFAULT_MAX_UPLOAD_STREAMS:-4}"
      COORDINATOR_DEFAULT_PUT_MAX_RECORD_BATCH_BYTES: "${COORDINATOR_DEFAULT_PUT_MAX_RECORD_BATCH_BYTES:-268435456}"
      COORDINATOR_DEFAULT_GET_MAX_BATCH_ROWS: "${COORDINATOR_DEFAULT_GET_MAX_BATCH_ROWS:-65536}"
      COORDINATOR_DEFAULT_GET_MAX_RECORD_BATCH_BYTES: "${COORDINATOR_DEFAULT_GET_MAX_RECORD_BATCH_BYTES:-134217728}"
      TRINO_URI: "${TRINO_URI:-http://trino:8080}"
      TRINO_CATALOG: "${TRINO_CATALOG:-iceberg}"
      TRINO_SCHEMA: "${TRINO_SCHEMA:-arrow}"
      TRINO_SOURCE: "${TRINO_SOURCE:-arrow-flight-coordinator}"
      CTAS_DEFAULT_CATALOG: "${CTAS_DEFAULT_CATALOG:-iceberg}"
      CTAS_DEFAULT_SCHEMA: "${CTAS_DEFAULT_SCHEMA:-arrow}"
      CTAS_TABLE_PREFIX: "${CTAS_TABLE_PREFIX:-ctas_tmp}"
    ports:
      - "8088:8088"

  bench:
    profiles:
      - bench
    build:
      context: .
      target: bench
    depends_on:
      - flight-server
    environment:
      FLIGHT_URI: "${BENCH_FLIGHT_URI:-http://flight-server:50051}"
      COORDINATOR_URI: "${BENCH_COORDINATOR_URI:-http://coordinator:8088}"
      COORDINATOR_ADMIN_TOKEN: "${COORDINATOR_ADMIN_TOKEN:-}"
      FLIGHT_MAX_MESSAGE_SIZE: "${FLIGHT_MAX_MESSAGE_SIZE:-268435456}"
      FLIGHT_DATA_CHUNK_SIZE: "${FLIGHT_DATA_CHUNK_SIZE:-16777216}"
      BENCH_DATA_DIR: "${BENCH_DATA_DIR:-/bench-data}"
      BENCH_MODE: "${BENCH_MODE:-single}"
      BENCH_SIZE: "${BENCH_SIZE:-1gb}"
      BENCH_INPUT: "${BENCH_INPUT:-}"
      BENCH_REGENERATE: "${BENCH_REGENERATE:-false}"
      BENCH_PATH: "${BENCH_PATH:-}"
      BENCH_FILE_SIZE: "${BENCH_FILE_SIZE:-${TARGET_FILE_SIZE:-512mb}}"
      BENCH_STARTUP_WAIT: "${BENCH_STARTUP_WAIT:-2}"
      ROWS_PER_BATCH: "${ROWS_PER_BATCH:-65536}"
      PAYLOAD_BYTES: "${PAYLOAD_BYTES:-64}"
      PUT_PROFILE: "${PUT_PROFILE:-false}"
      UPLOAD_STREAMS: "${UPLOAD_STREAMS:-${PUT_STREAMS:-1}}"
      PUT_STREAMS: "${PUT_STREAMS:-6}"
      PUT_CLIENT_QUEUE_DEPTH: "${PUT_CLIENT_QUEUE_DEPTH:-2}"
      PUT_MAX_RECORD_BATCH_BYTES: "${PUT_MAX_RECORD_BATCH_BYTES:-}"
      COORDINATOR_OPERATION_ID: "${COORDINATOR_OPERATION_ID:-}"
      COORDINATOR_TABLE_NAME: "${COORDINATOR_TABLE_NAME:-}"
      COORDINATOR_QUERY_SQL: "${COORDINATOR_QUERY_SQL:-}"
      COORDINATOR_TARGET_TABLE: "${COORDINATOR_TARGET_TABLE:-}"
      COORDINATOR_POLL_INTERVAL_MS: "${COORDINATOR_POLL_INTERVAL_MS:-}"
      COORDINATOR_MAX_POLLS: "${COORDINATOR_MAX_POLLS:-}"
      TRINO_USER: "${TRINO_USER:-}"
      TRINO_AUTHORIZATION: "${TRINO_AUTHORIZATION:-}"
      READ_BACK: "${READ_BACK:-first}"
      READ_MAX_FILES: "${READ_MAX_FILES:-}"
      GET_MAX_BATCH_ROWS: "${GET_MAX_BATCH_ROWS:-}"
      GET_MAX_RECORD_BATCH_BYTES: "${GET_MAX_RECORD_BATCH_BYTES:-}"
      BENCH_STAGING_PREFIX: "${BENCH_STAGING_PREFIX:-}"
      BENCH_MAX_UPLOAD_STREAMS: "${BENCH_MAX_UPLOAD_STREAMS:-}"
      BENCH_MAX_STREAM_BYTES: "${BENCH_MAX_STREAM_BYTES:-}"
      PROFILE_PART_LIMIT: "${PROFILE_PART_LIMIT:-16}"
    volumes:
      - benchmark-data:/bench-data

volumes:
  minio-data:
  metadata-db-data:
  benchmark-data:
